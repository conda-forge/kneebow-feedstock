{% set name = "kneebow" %}
{% set version = "1.0.4" %}
{% set python_min = "3.9" %}  # Updated to reflect conda-forge minimum Python version if needed.

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/kneebow-{{ version }}.tar.gz
  sha256: 146fe65caf5c666a6b73749240b934fedeee1b38859656ae829c12ad65d18fce

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools

  run:
    - python >={{ python_min }}
    - numpy
    - matplotlib-base
    - scikit-learn

test:
  imports:
    - kneebow
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/georg-un/kneebow
  summary: Knee or elbow detection for curves
  license: MIT
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - jaidevjoshi83
